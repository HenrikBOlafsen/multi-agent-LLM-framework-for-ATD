cycles_file: cycles_to_analyze_dev.txt
results_root: results_dev
experiment_id: expAA

policy:
  delete_refactor_branches_after_metrics: true

llm:
  base_url: "http://host.docker.internal:8012/v1"
  api_key: "placeholder"
  model_raw: "Qwen3-Coder-30B-A3B-Instruct"
  context_length: 32768

openhands:
  runtime_image: "docker.openhands.dev/openhands/runtime:1.4-nikolaik"
