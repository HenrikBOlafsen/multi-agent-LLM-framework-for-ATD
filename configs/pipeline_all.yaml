      orchestrator: multi_agent
      edge_variant: E0
      synthesizer_variant: S0
      auxiliary_agent: none

  - id: explain_E1_S1_noaux
    params:
      orchestrator: multi_agent
      edge_variant: E1
      synthesizer_variant: S1
      auxiliary_agent: none

  - id: explain_E2_S2_noaux
