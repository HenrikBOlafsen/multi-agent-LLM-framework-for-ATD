      orchestrator: multi_agent
      edge_variant: E2
      synthesizer_variant: S2
      auxiliary_agent: none

  - id: explain_E2_S2_boundary
    params:
      orchestrator: multi_agent
      edge_variant: E2
      synthesizer_variant: S2
      auxiliary_agent: boundary

  - id: explain_E2_S2_graph
